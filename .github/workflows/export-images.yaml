name: 导出镜像包

on:
  workflow_dispatch:
    inputs:
      images_b64:
        description: 网页中选中的镜像列表，使用 Base64 编码传入
        required: true
        type: string

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  export:
    name: 生成镜像包
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 准备磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 128
          remove-dotnet: 'true'
          remove-haskell: 'true'
          build-mount-path: '/var/lib/docker/'

      - name: 重启容器服务
        run: sudo service docker restart

      - name: 拉取阿里云镜像并打包
        id: package
        run: |
          set -euo pipefail

          docker login -u "$ALIYUN_REGISTRY_USER" -p "$ALIYUN_REGISTRY_PASSWORD" "$ALIYUN_REGISTRY"

          printf '%s' '${{ inputs.images_b64 }}' | base64 -d > selected-images.txt
          image_list_file="selected-images.txt"
          mapfile -t selected_images < <(awk 'NF && $1 !~ /^#/ { print $NF }' "$image_list_file")
          first_image="${selected_images[0]}"
          image_count="${#selected_images[@]}"
          safe_label=$(printf '%s' "$first_image" | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' | cut -c1-70)
          if [ -z "$safe_label" ]; then
            safe_label="selected"
          fi
          if [ "$image_count" -gt 1 ]; then
            artifact_name="docker-images-${safe_label}-plus-$((image_count - 1))"
          else
            artifact_name="docker-images-${safe_label}"
          fi
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

          declare -A duplicate_images
          declare -A temp_map
          while IFS= read -r line || [ -n "$line" ]; do
              [[ -z "$line" ]] && continue
              if echo "$line" | grep -q '^\s*#'; then
                  continue
              fi

              image=$(echo "$line" | awk '{print $NF}')
              image="${image%%@*}"
              image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
              name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
              name_space="${name_space}_"
              image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

              if [[ -n "${temp_map[$image_name]:-}" ]]; then
                   if [[ "${temp_map[$image_name]}" != "$name_space" ]]; then
                      duplicate_images[$image_name]="true"
                   fi
              else
                  temp_map[$image_name]=$name_space
              fi
          done < "$image_list_file"

          mkdir -p export
          export_images=()
          {
            echo "镜像包清单"
            echo "生成时间：$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
          } > export/manifest.txt

          while IFS= read -r line || [ -n "$line" ]; do
              [[ -z "$line" ]] && continue
              if echo "$line" | grep -q '^\s*#'; then
                  continue
              fi

              platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')
              if [ -z "$platform" ]; then
                  platform_prefix=""
              else
                  platform_prefix="${platform//\//_}_"
              fi

              image=$(echo "$line" | awk '{print $NF}')
              image_no_digest="${image%%@*}"
              image_name_tag=$(echo "$image_no_digest" | awk -F'/' '{print $NF}')
              name_space=$(echo "$image_no_digest" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
              image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

              name_space_prefix=""
              if [[ -n "${duplicate_images[$image_name]:-}" ]]; then
                 if [[ -n "${name_space}" ]]; then
                    name_space_prefix="${name_space}_"
                 fi
              fi

              aliyun_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$platform_prefix$name_space_prefix$image_name_tag"
              echo "docker pull $aliyun_image"
              docker pull "$aliyun_image"

              if [[ "$image" != *"@"* ]]; then
                echo "docker tag $aliyun_image $image"
                docker tag "$aliyun_image" "$image"
                export_images+=("$image")
                export_image="$image"
              else
                export_images+=("$aliyun_image")
                export_image="$aliyun_image"
              fi

              {
                echo "原始镜像：$image"
                echo "阿里云镜像：$aliyun_image"
                echo "包内标签：$export_image"
                if [ -n "$platform" ]; then
                  echo "指定架构：$platform"
                fi
                echo
              } >> export/manifest.txt
          done < "$image_list_file"

          docker save "${export_images[@]}" | gzip > export/docker-images.tar.gz
          printf '导入方式：\n\n  docker load -i docker-images.tar.gz\n\n镜像清单请查看 manifest.txt。\n' > export/README.txt

      - name: 上传镜像包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: export/
          retention-days: 7

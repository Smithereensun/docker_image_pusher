name: Export Docker Images

on:
  workflow_dispatch:

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  export:
    name: Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Prepare disk
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 128
          remove-dotnet: 'true'
          remove-haskell: 'true'
          build-mount-path: '/var/lib/docker/'

      - name: Restart docker
        run: sudo service docker restart

      - name: Pull from Aliyun and export
        run: |
          set -euo pipefail

          docker login -u "$ALIYUN_REGISTRY_USER" -p "$ALIYUN_REGISTRY_PASSWORD" "$ALIYUN_REGISTRY"

          declare -A duplicate_images
          declare -A temp_map
          while IFS= read -r line || [ -n "$line" ]; do
              [[ -z "$line" ]] && continue
              if echo "$line" | grep -q '^\s*#'; then
                  continue
              fi

              image=$(echo "$line" | awk '{print $NF}')
              image="${image%%@*}"
              image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
              name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
              name_space="${name_space}_"
              image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

              if [[ -n "${temp_map[$image_name]:-}" ]]; then
                   if [[ "${temp_map[$image_name]}" != "$name_space" ]]; then
                      duplicate_images[$image_name]="true"
                   fi
              else
                  temp_map[$image_name]=$name_space
              fi
          done < images.txt

          mkdir -p export
          export_images=()

          while IFS= read -r line || [ -n "$line" ]; do
              [[ -z "$line" ]] && continue
              if echo "$line" | grep -q '^\s*#'; then
                  continue
              fi

              platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')
              if [ -z "$platform" ]; then
                  platform_prefix=""
              else
                  platform_prefix="${platform//\//_}_"
              fi

              image=$(echo "$line" | awk '{print $NF}')
              image_no_digest="${image%%@*}"
              image_name_tag=$(echo "$image_no_digest" | awk -F'/' '{print $NF}')
              name_space=$(echo "$image_no_digest" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
              image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

              name_space_prefix=""
              if [[ -n "${duplicate_images[$image_name]:-}" ]]; then
                 if [[ -n "${name_space}" ]]; then
                    name_space_prefix="${name_space}_"
                 fi
              fi

              aliyun_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$platform_prefix$name_space_prefix$image_name_tag"
              echo "docker pull $aliyun_image"
              docker pull "$aliyun_image"

              if [[ "$image" != *"@"* ]]; then
                echo "docker tag $aliyun_image $image"
                docker tag "$aliyun_image" "$image"
                export_images+=("$image")
              else
                export_images+=("$aliyun_image")
              fi
          done < images.txt

          docker save "${export_images[@]}" | gzip > export/docker-images.tar.gz
          cat > export/README.txt <<'EOF'
Import with:

  docker load -i docker-images.tar.gz
          EOF

      - name: Upload docker image archive
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: export/
          retention-days: 7
